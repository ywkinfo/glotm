name: Verify Release

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  verify-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Prepare generated content
        run: npm run content:prepare

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify Release
        run: npm run verify:release

      - name: Publish Job Summary
        if: always()
        run: |
          {
             echo "## Verify Release Summary"
             echo
             echo "- Includes generated content prep: \`npm run content:prepare\`"
             echo "- Workflow: \`npm run verify:release\`"
             echo "- Includes: \`npm test\`, \`npm run e2e:smoke\`, \`npm run build:pages:glotm\`"
             echo "- Playwright HTML report artifact: \`playwright-report\`"
            echo "- Playwright raw results artifact: \`playwright-test-results\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
